<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Multiverse Resume — AI Resume Builder</title>
  <link rel="stylesheet" href="styles.css">
  <!-- PDF.js for resume import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
  <!-- html2canvas + jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body>
  <div id="app">
    <!-- App shell rendered by JS -->
    <div id="loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
      <div style="font-size:28px;font-weight:800;color:#1e293b;">
        The Multiverse <span style="background:linear-gradient(135deg,#e8708a,#db7093,#c9657e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Resume</span>
      </div>
      <div style="font-size:13px;color:#94a3b8;">Loading...</div>
    </div>
  </div>

  <!-- API Key Setup Modal -->
  <div id="api-key-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content glass" style="max-width:480px;padding:32px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:24px;font-weight:800;color:#1e293b;margin-bottom:8px;">
          Welcome to <span style="background:linear-gradient(135deg,#e8708a,#db7093);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">ResumeForge</span>
        </div>
        <div style="font-size:14px;color:#475569;">AI-powered resume builder using Google Gemini</div>
      </div>
      <div style="margin-bottom:16px;">
        <label class="label">Gemini API Key</label>
        <input id="api-key-input" type="password" class="glass-input" placeholder="AIzaSy..." style="font-family:monospace;">
        <div style="font-size:11px;color:#94a3b8;margin-top:6px;">
          Get your free key at <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#7ba5a5;text-decoration:underline;">aistudio.google.com/apikey</a>
        </div>
      </div>
      <div style="padding:12px;border-radius:8px;background:rgba(196,162,101,0.08);border:1px solid rgba(196,162,101,0.2);margin-bottom:20px;">
        <div style="font-size:11px;color:#8a6d2e;line-height:1.6;">
          Your key is stored locally in your browser and never sent anywhere except Google's API. This app is designed for personal use.
        </div>
      </div>
      <button id="api-key-submit" class="btn-primary" style="width:100%;padding:14px;font-size:14px;" disabled>
        Get Started
      </button>
      <button id="api-key-skip" style="width:100%;padding:10px;font-size:12px;color:#94a3b8;background:none;border:none;cursor:pointer;margin-top:8px;">
        Skip for now (AI features will be limited)
      </button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
