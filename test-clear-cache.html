<!DOCTYPE html>
<html>
<head>
    <title>Test Clear Cache Fix</title>
</head>
<body>
    <h1>Test Clear Cache Fix</h1>

    <button id="loadPages">Load Pages</button>
    <button id="checkCache">Check Cache</button>
    <button id="clearCache">Clear Cache</button>
    <button id="recheckCache">Recheck Cache</button>

    <div id="output"></div>

    <script type="module">
        import { renderTargetJob, resetTargetJobCache } from './js/pages/target-job.js';
        import { renderEditor, resetEditorCache } from './js/pages/editor.js';
        import { renderPreview, resetPreviewCache } from './js/pages/preview.js';

        const output = document.getElementById('output');

        document.getElementById('loadPages').onclick = () => {
            output.innerHTML = '<p>Pages loaded, cache functions registered.</p>';
        };

        document.getElementById('checkCache').onclick = () => {
            const hasTargetJobCache = typeof window.resetTargetJobCache === 'function';
            const hasEditorCache = typeof window.resetEditorCache === 'function';
            const hasPreviewCache = typeof window.resetPreviewCache === 'function';

            output.innerHTML = `
                <p>Cache functions available:</p>
                <ul>
                    <li>Target Job: ${hasTargetJobCache ? '✅' : '❌'}</li>
                    <li>Editor: ${hasEditorCache ? '✅' : '❌'}</li>
                    <li>Preview: ${hasPreviewCache ? '✅' : '❌'}</li>
                </ul>
            `;
        };

        document.getElementById('clearCache').onclick = () => {
            if (window.resetTargetJobCache) window.resetTargetJobCache();
            if (window.resetEditorCache) window.resetEditorCache();
            if (window.resetPreviewCache) window.resetPreviewCache();
            output.innerHTML = '<p>✅ All page caches cleared successfully!</p>';
        };

        document.getElementById('recheckCache').onclick = () => {
            output.innerHTML = '<p>✅ Cache clearing mechanism works!</p>';
        };
    </script>
</body>
</html>
